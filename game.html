<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>霓虹接星 - 游戏中</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-stars" id="bgStars"></div>

  <header class="game-header">
    <div class="stat-group">
      <div class="stat">
        <div class="stat-label">得分</div>
        <div class="stat-value score" id="scoreValue">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">连击</div>
        <div class="stat-value combo" id="comboValue">—</div>
      </div>
    </div>
    <div class="stat-group">
      <div class="stat">
        <div class="stat-label">生命</div>
        <div class="stat-value lives" id="livesValue">❤❤❤</div>
      </div>
      <div class="stat">
        <div class="stat-label">时间</div>
        <div class="stat-value time" id="timeValue">60</div>
      </div>
    </div>
  </header>

  <div class="game-area" id="gameArea"></div>

  <div class="combo-banner" id="comboBanner"></div>

  <div class="game-overlay visible" id="startOverlay">
    <h2 style="font-family: Orbitron, sans-serif; color: var(--neon-cyan); font-size: 2rem;">准备好了吗？</h2>
    <p>点击星星接住它们，别让星星落地！</p>
    <button class="btn btn-primary" id="startBtn" style="max-width: 260px;">开始</button>
    <a href="star.html" class="btn btn-secondary" style="max-width: 260px;">返回</a>
  </div>

  <div class="game-overlay" id="pauseOverlay">
    <h2>游戏暂停</h2>
    <p>按 Esc 或点击继续</p>
    <button class="btn btn-primary" id="resumeBtn" style="max-width: 260px;">继续游戏</button>
    <button class="btn btn-danger" id="quitBtn" style="max-width: 260px;">退出</button>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/game.js"></script>
  <script>
    const container = document.getElementById('bgStars');
    for (let i = 0; i < 40; i++) {
      const star = document.createElement('span');
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      container.appendChild(star);
    }
  </script>
</body>
</html>
