<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>霓虹贪吃蛇 - 游戏中</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-stars" id="bgStars"></div>

  <header class="game-header">
    <a href="snake.html" style="color: var(--text-dim); text-decoration: none; font-size: 0.85rem;">← 退出</a>
    <div class="stat-group">
      <div class="stat">
        <div class="stat-label">得分</div>
        <div class="stat-value score" id="scoreValue">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">长度</div>
        <div class="stat-value combo" id="lengthValue">3</div>
      </div>
    </div>
  </header>

  <main class="snake-wrap">
    <canvas id="snakeCanvas" class="snake-canvas"></canvas>
    <p class="snake-controls">方向键 / WASD 控制 · 空格开始</p>

    <div class="snake-mobile-pad">
      <span class="empty"></span>
      <button id="padUp" type="button">▲</button>
      <span class="empty"></span>
      <button id="padLeft" type="button">◀</button>
      <span class="empty"></span>
      <button id="padRight" type="button">▶</button>
      <span class="empty"></span>
      <button id="padDown" type="button">▼</button>
      <span class="empty"></span>
    </div>
  </main>

  <div class="game-overlay visible" id="startOverlay">
    <h2 style="font-family: Orbitron, sans-serif; color: var(--neon-cyan); font-size: 2rem;">准备好了吗？</h2>
    <p>吞噬能量块，成为最长的光蛇！</p>
    <button class="btn btn-primary" id="startBtn" style="max-width: 260px;">开始</button>
    <a href="snake.html" class="btn btn-secondary" style="max-width: 260px;">返回</a>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/snake.js"></script>
  <script>
    const container = document.getElementById('bgStars');
    for (let i = 0; i < 40; i++) {
      const star = document.createElement('span');
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      container.appendChild(star);
    }
  </script>
</body>
</html>
